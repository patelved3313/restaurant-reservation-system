services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: autotrade
      POSTGRES_PASSWORD: autotrade
      POSTGRES_DB: autotrade
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autotrade -d autotrade"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://autotrade:autotrade@db:5432/autotrade
      ENABLE_LIVE_TRADING: "false"
      PAPER_STARTING_CASH: "100000"
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    environment:
      API_INTERNAL_URL: http://backend:8000/api
      NEXT_PUBLIC_API_URL: http://localhost:8000/api
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:

